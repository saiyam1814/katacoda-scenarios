<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="s6"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/></filter>
    <marker id="a6" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#CBD5E0"/>
    </marker>
  </defs>

  <rect width="900" height="600" rx="12" fill="#F8F9FA"/>
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1A202C">Production Architecture: vCluster Platform + GPU Infrastructure</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#718096">The complete picture: What you built today scales to this</text>

  <!-- Platform Control Plane -->
  <rect x="20" y="70" width="860" height="70" rx="8" fill="white" stroke="#7C3AED" stroke-width="2" filter="url(#s6)"/>
  <rect x="20" y="70" width="8" height="70" rx="4" fill="#7C3AED"/>
  <text x="50" y="98" font-size="14" font-weight="bold" fill="#7C3AED">vCluster Platform Control Plane</text>
  <text x="50" y="118" font-size="11" fill="#6B7280">Central management, RBAC, quotas, sleep mode, cost allocation, audit logging</text>
  <rect x="620" y="82" width="100" height="22" rx="4" fill="#7C3AED" opacity="0.1" stroke="#7C3AED" stroke-width="1"/>
  <text x="670" y="97" text-anchor="middle" font-size="9" fill="#7C3AED" font-weight="bold">UI Dashboard</text>
  <rect x="730" y="82" width="70" height="22" rx="4" fill="#7C3AED" opacity="0.1" stroke="#7C3AED" stroke-width="1"/>
  <text x="765" y="97" text-anchor="middle" font-size="9" fill="#7C3AED" font-weight="bold">API</text>
  <rect x="810" y="82" width="55" height="22" rx="4" fill="#7C3AED" opacity="0.1" stroke="#7C3AED" stroke-width="1"/>
  <text x="837" y="97" text-anchor="middle" font-size="9" fill="#7C3AED" font-weight="bold">CLI</text>

  <!-- Arrow down -->
  <line x1="450" y1="140" x2="450" y2="158" stroke="#CBD5E0" stroke-width="2" marker-end="url(#a6)"/>

  <!-- Host Cluster -->
  <rect x="20" y="160" width="860" height="420" rx="10" fill="#1A202C" filter="url(#s6)"/>
  <text x="50" y="185" font-size="14" font-weight="bold" fill="white">Host Kubernetes Cluster (GKE / EKS / On-Prem)</text>

  <!-- Shared Stack Bar -->
  <rect x="35" y="200" width="830" height="35" rx="5" fill="#2D3748"/>
  <text x="50" y="222" font-size="10" fill="#A0AEC0" font-weight="bold">Shared:</text>
  <rect x="100" y="206" width="80" height="22" rx="3" fill="#326CE5" opacity="0.7"/>
  <text x="140" y="221" text-anchor="middle" font-size="8" fill="white">Ingress</text>
  <rect x="188" y="206" width="90" height="22" rx="3" fill="#326CE5" opacity="0.7"/>
  <text x="233" y="221" text-anchor="middle" font-size="8" fill="white">cert-manager</text>
  <rect x="286" y="206" width="100" height="22" rx="3" fill="#76B900" opacity="0.7"/>
  <text x="336" y="221" text-anchor="middle" font-size="8" fill="white">GPU Operator</text>
  <rect x="394" y="206" width="70" height="22" rx="3" fill="#76B900" opacity="0.7"/>
  <text x="429" y="221" text-anchor="middle" font-size="8" fill="white">DCGM</text>
  <rect x="472" y="206" width="80" height="22" rx="3" fill="#FF6B35" opacity="0.7"/>
  <text x="512" y="221" text-anchor="middle" font-size="8" fill="white">Monitoring</text>
  <rect x="560" y="206" width="80" height="22" rx="3" fill="#FF6B35" opacity="0.7"/>
  <text x="600" y="221" text-anchor="middle" font-size="8" fill="white">Kyverno</text>
  <rect x="648" y="206" width="100" height="22" rx="3" fill="#7C3AED" opacity="0.7"/>
  <text x="698" y="221" text-anchor="middle" font-size="8" fill="white">Auto Nodes</text>
  <rect x="756" y="206" width="95" height="22" rx="3" fill="#7C3AED" opacity="0.7"/>
  <text x="803" y="221" text-anchor="middle" font-size="8" fill="white">Karpenter</text>

  <!-- Three vClusters -->
  <!-- vCluster 1 -->
  <rect x="35" y="250" width="260" height="160" rx="8" fill="#1E293B" stroke="#326CE5" stroke-width="2"/>
  <rect x="35" y="250" width="260" height="28" rx="8" fill="#326CE5"/>
  <rect x="35" y="270" width="260" height="8" fill="#326CE5"/>
  <text x="165" y="270" text-anchor="middle" font-size="11" font-weight="bold" fill="white">vCluster: ml-training</text>

  <rect x="50" y="290" width="110" height="50" rx="5" fill="#0F172A" stroke="#326CE5" stroke-width="0.5"/>
  <text x="105" y="310" text-anchor="middle" font-size="9" font-weight="bold" fill="#93C5FD">PyTorch Job</text>
  <text x="105" y="325" text-anchor="middle" font-size="8" fill="#64748B">4x A100 GPUs</text>

  <rect x="170" y="290" width="110" height="50" rx="5" fill="#0F172A" stroke="#326CE5" stroke-width="0.5"/>
  <text x="225" y="310" text-anchor="middle" font-size="9" font-weight="bold" fill="#93C5FD">MLflow</text>
  <text x="225" y="325" text-anchor="middle" font-size="8" fill="#64748B">Experiment tracking</text>

  <rect x="50" y="350" width="230" height="25" rx="4" fill="#0F172A"/>
  <text x="165" y="367" text-anchor="middle" font-size="8" fill="#64748B">Quota: 8 GPU | 32 CPU | 128Gi RAM</text>

  <rect x="50" y="380" width="230" height="18" rx="4" fill="#326CE5" opacity="0.15"/>
  <text x="165" y="393" text-anchor="middle" font-size="8" fill="#93C5FD">Private Nodes via Auto Nodes + BCM</text>

  <!-- vCluster 2 -->
  <rect x="310" y="250" width="260" height="160" rx="8" fill="#1E293B" stroke="#FF6B35" stroke-width="2"/>
  <rect x="310" y="250" width="260" height="28" rx="8" fill="#FF6B35"/>
  <rect x="310" y="270" width="260" height="8" fill="#FF6B35"/>
  <text x="440" y="270" text-anchor="middle" font-size="11" font-weight="bold" fill="white">vCluster: inference-prod</text>

  <rect x="325" y="290" width="110" height="50" rx="5" fill="#0F172A" stroke="#FF6B35" stroke-width="0.5"/>
  <text x="380" y="310" text-anchor="middle" font-size="9" font-weight="bold" fill="#FDBA74">Ollama</text>
  <text x="380" y="325" text-anchor="middle" font-size="8" fill="#64748B">Llama 70B, MIG</text>

  <rect x="445" y="290" width="110" height="50" rx="5" fill="#0F172A" stroke="#FF6B35" stroke-width="0.5"/>
  <text x="500" y="310" text-anchor="middle" font-size="9" font-weight="bold" fill="#FDBA74">RAG Service</text>
  <text x="500" y="325" text-anchor="middle" font-size="8" fill="#64748B">Qdrant + API</text>

  <rect x="325" y="350" width="230" height="25" rx="4" fill="#0F172A"/>
  <text x="440" y="367" text-anchor="middle" font-size="8" fill="#64748B">Quota: 4 GPU (MIG) | 16 CPU | 64Gi RAM</text>

  <rect x="325" y="380" width="230" height="18" rx="4" fill="#FF6B35" opacity="0.15"/>
  <text x="440" y="393" text-anchor="middle" font-size="8" fill="#FDBA74">GPU Sharing: MIG 3g.40gb instances</text>

  <!-- vCluster 3 -->
  <rect x="585" y="250" width="260" height="160" rx="8" fill="#1E293B" stroke="#76B900" stroke-width="2"/>
  <rect x="585" y="250" width="260" height="28" rx="8" fill="#76B900"/>
  <rect x="585" y="270" width="260" height="8" fill="#76B900"/>
  <text x="715" y="270" text-anchor="middle" font-size="11" font-weight="bold" fill="white">vCluster: dev-sandbox</text>

  <rect x="600" y="290" width="110" height="50" rx="5" fill="#0F172A" stroke="#76B900" stroke-width="0.5"/>
  <text x="655" y="310" text-anchor="middle" font-size="9" font-weight="bold" fill="#86EFAC">Ollama</text>
  <text x="655" y="325" text-anchor="middle" font-size="8" fill="#64748B">TinyLlama, CPU</text>

  <rect x="720" y="290" width="110" height="50" rx="5" fill="#0F172A" stroke="#76B900" stroke-width="0.5"/>
  <text x="775" y="310" text-anchor="middle" font-size="9" font-weight="bold" fill="#86EFAC">Jupyter</text>
  <text x="775" y="325" text-anchor="middle" font-size="8" fill="#64748B">Notebooks</text>

  <rect x="600" y="350" width="230" height="25" rx="4" fill="#0F172A"/>
  <text x="715" y="367" text-anchor="middle" font-size="8" fill="#64748B">Quota: 0 GPU | 4 CPU | 8Gi RAM</text>

  <rect x="600" y="380" width="230" height="18" rx="4" fill="#76B900" opacity="0.15"/>
  <text x="715" y="393" text-anchor="middle" font-size="8" fill="#86EFAC">CPU-only, sleep after 30min idle</text>

  <!-- Physical Infrastructure -->
  <rect x="35" y="425" width="830" height="55" rx="6" fill="#0F172A" stroke="#334155" stroke-width="1"/>
  <text x="50" y="445" font-size="11" font-weight="bold" fill="#E2E8F0">Physical Infrastructure</text>

  <rect x="50" y="455" width="130" height="18" rx="3" fill="#1E293B"/>
  <text x="115" y="468" text-anchor="middle" font-size="8" fill="#76B900">DGX H100 x4</text>

  <rect x="190" y="455" width="130" height="18" rx="3" fill="#1E293B"/>
  <text x="255" y="468" text-anchor="middle" font-size="8" fill="#76B900">A100 Node Pool x8</text>

  <rect x="330" y="455" width="130" height="18" rx="3" fill="#1E293B"/>
  <text x="395" y="468" text-anchor="middle" font-size="8" fill="#326CE5">CPU Node Pool x16</text>

  <rect x="470" y="455" width="130" height="18" rx="3" fill="#1E293B"/>
  <text x="535" y="468" text-anchor="middle" font-size="8" fill="#FF6B35">NVLink Fabric</text>

  <rect x="610" y="455" width="120" height="18" rx="3" fill="#1E293B"/>
  <text x="670" y="468" text-anchor="middle" font-size="8" fill="#7C3AED">Auto Nodes</text>

  <rect x="740" y="455" width="110" height="18" rx="3" fill="#1E293B"/>
  <text x="795" y="468" text-anchor="middle" font-size="8" fill="#A0AEC0">3.35 TB/s BW</text>

  <!-- Bottom: What you built today mapping -->
  <rect x="20" y="500" width="860" height="80" rx="8" fill="white" stroke="#38A169" stroke-width="2" filter="url(#s6)"/>
  <text x="450" y="522" text-anchor="middle" font-size="13" font-weight="bold" fill="#276749">What You Built Today Maps to Production</text>

  <rect x="40" y="535" width="160" height="30" rx="5" fill="#DCFCE7"/>
  <text x="120" y="555" text-anchor="middle" font-size="9" fill="#166534" font-weight="bold">Ollama on CPU (Step 1-2)</text>

  <text x="210" y="555" text-anchor="middle" font-size="14" fill="#CBD5E0">--&gt;</text>

  <rect x="225" y="535" width="160" height="30" rx="5" fill="#DCFCE7"/>
  <text x="305" y="555" text-anchor="middle" font-size="9" fill="#166534" font-weight="bold">Ollama on GPU + MIG</text>

  <rect x="405" y="535" width="130" height="30" rx="5" fill="#DBEAFE"/>
  <text x="470" y="555" text-anchor="middle" font-size="9" fill="#1E40AF" font-weight="bold">RAG (Step 3-4)</text>

  <text x="545" y="555" text-anchor="middle" font-size="14" fill="#CBD5E0">--&gt;</text>

  <rect x="555" y="535" width="140" height="30" rx="5" fill="#DBEAFE"/>
  <text x="625" y="555" text-anchor="middle" font-size="9" fill="#1E40AF" font-weight="bold">Qdrant + Production RAG</text>

  <rect x="715" y="535" width="150" height="30" rx="5" fill="#F3E8FF"/>
  <text x="790" y="555" text-anchor="middle" font-size="9" fill="#6B21A8" font-weight="bold">vCluster (Step 5) = This!</text>
</svg>