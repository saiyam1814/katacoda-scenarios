<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="cpuGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#326CE5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gpuGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8BC34A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#76B900;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" rx="12" fill="#F8F9FA"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#1A202C">CPU vs GPU Architecture</text>
  <text x="450" y="62" text-anchor="middle" font-size="13" fill="#718096">Why GPUs dominate AI/ML workloads</text>

  <!-- CPU Section -->
  <rect x="30" y="80" width="400" height="390" rx="10" fill="white" stroke="#E2E8F0" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="80" width="400" height="45" rx="10" fill="url(#cpuGrad)"/>
  <rect x="30" y="115" width="400" height="10" fill="url(#cpuGrad)"/>
  <text x="230" y="110" text-anchor="middle" font-size="18" font-weight="bold" fill="white">CPU - Central Processing Unit</text>

  <!-- CPU Cores (4 large) -->
  <text x="230" y="150" text-anchor="middle" font-size="12" fill="#718096">4-64 Powerful Cores (Sequential Processing)</text>

  <rect x="60" y="165" width="80" height="80" rx="8" fill="#326CE5" opacity="0.9"/>
  <text x="100" y="200" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Core 1</text>
  <text x="100" y="218" text-anchor="middle" font-size="9" fill="#DBEAFE">ALU + Cache</text>
  <text x="100" y="232" text-anchor="middle" font-size="9" fill="#DBEAFE">5 GHz</text>

  <rect x="160" y="165" width="80" height="80" rx="8" fill="#326CE5" opacity="0.9"/>
  <text x="200" y="200" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Core 2</text>
  <text x="200" y="218" text-anchor="middle" font-size="9" fill="#DBEAFE">ALU + Cache</text>
  <text x="200" y="232" text-anchor="middle" font-size="9" fill="#DBEAFE">5 GHz</text>

  <rect x="260" y="165" width="80" height="80" rx="8" fill="#326CE5" opacity="0.9"/>
  <text x="300" y="200" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Core 3</text>
  <text x="300" y="218" text-anchor="middle" font-size="9" fill="#DBEAFE">ALU + Cache</text>
  <text x="300" y="232" text-anchor="middle" font-size="9" fill="#DBEAFE">5 GHz</text>

  <rect x="340" y="165" width="80" height="80" rx="8" fill="#326CE5" opacity="0.85"/>
  <text x="380" y="200" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Core 4</text>
  <text x="380" y="218" text-anchor="middle" font-size="9" fill="#DBEAFE">ALU + Cache</text>
  <text x="380" y="232" text-anchor="middle" font-size="9" fill="#DBEAFE">5 GHz</text>

  <!-- CPU L3 Cache -->
  <rect x="60" y="260" width="360" height="30" rx="5" fill="#DBEAFE" stroke="#326CE5" stroke-width="1"/>
  <text x="240" y="280" text-anchor="middle" font-size="12" fill="#326CE5" font-weight="bold">Large L3 Cache (32-128 MB)</text>

  <!-- CPU Characteristics -->
  <text x="60" y="315" font-size="12" fill="#2D3748" font-weight="bold">Strengths:</text>
  <text x="60" y="335" font-size="11" fill="#4A5568">&#8226; Complex logic &amp; branching</text>
  <text x="60" y="353" font-size="11" fill="#4A5568">&#8226; Low latency per-thread</text>
  <text x="60" y="371" font-size="11" fill="#4A5568">&#8226; Operating system tasks</text>
  <text x="60" y="389" font-size="11" fill="#4A5568">&#8226; General-purpose computing</text>

  <text x="250" y="315" font-size="12" fill="#2D3748" font-weight="bold">AI Workloads:</text>
  <text x="250" y="335" font-size="11" fill="#E53E3E">&#8226; Slow for matrix operations</text>
  <text x="250" y="353" font-size="11" fill="#E53E3E">&#8226; Limited parallelism</text>
  <text x="250" y="371" font-size="11" fill="#4A5568">&#8226; Good for: Inference (small)</text>
  <text x="250" y="389" font-size="11" fill="#4A5568">&#8226; TinyLlama: ~5-10 tok/s</text>

  <!-- CPU Bottom badge -->
  <rect x="120" y="410" width="220" height="30" rx="15" fill="#EBF4FF" stroke="#326CE5" stroke-width="1"/>
  <text x="230" y="430" text-anchor="middle" font-size="12" fill="#326CE5" font-weight="bold">Sequential: One task at a time</text>

