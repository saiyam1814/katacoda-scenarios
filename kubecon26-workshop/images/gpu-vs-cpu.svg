  <rect x="470" y="80" width="400" height="45" rx="10" fill="url(#gpuGrad)"/>
  <rect x="470" y="115" width="400" height="10" fill="url(#gpuGrad)"/>
  <text x="670" y="110" text-anchor="middle" font-size="18" font-weight="bold" fill="white">GPU - Graphics Processing Unit</text>

  <!-- GPU Cores Grid (many small) -->
  <text x="670" y="150" text-anchor="middle" font-size="12" fill="#718096">Thousands of Simple Cores (Parallel Processing)</text>

