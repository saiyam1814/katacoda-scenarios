<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="layerGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#326CE5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A90D9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layerGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#76B900;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8BC34A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layerGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF9800;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layerGrad4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow2">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="800" height="600" rx="12" fill="#F8F9FA"/>
  <text x="400" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#1A202C">How a GPU Workload Runs on Kubernetes</text>
  <text x="400" y="58" text-anchor="middle" font-size="13" fill="#718096">From hardware to pod - the complete stack</text>

  <!-- Layer 7: Application (Top) -->
  <rect x="80" y="75" width="640" height="60" rx="8" fill="#F3E8FF" stroke="#7C3AED" stroke-width="2" filter="url(#shadow2)"/>
  <rect x="80" y="75" width="8" height="60" rx="4" fill="url(#layerGrad4)"/>
  <text x="120" y="100" font-size="14" font-weight="bold" fill="#7C3AED">Application Layer</text>
  <text x="120" y="118" font-size="11" fill="#6B7280">Ollama / vLLM / TensorFlow serving your LLM model</text>
  <text x="620" y="100" font-size="11" fill="#9CA3AF" text-anchor="end">requests: nvidia.com/gpu: 1</text>
  <text x="620" y="118" font-size="11" fill="#9CA3AF" text-anchor="end">Pod spec in Deployment YAML</text>

  <!-- Arrow -->
  <path d="M400 135 L400 150" stroke="#CBD5E0" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs><marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#CBD5E0"/></marker></defs>

  <!-- Layer 6: Kubernetes Scheduler -->
  <rect x="80" y="150" width="640" height="60" rx="8" fill="#EBF4FF" stroke="#326CE5" stroke-width="2" filter="url(#shadow2)"/>
  <rect x="80" y="150" width="8" height="60" rx="4" fill="url(#layerGrad1)"/>
  <text x="120" y="175" font-size="14" font-weight="bold" fill="#326CE5">Kubernetes Scheduler</text>
  <text x="120" y="193" font-size="11" fill="#6B7280">Finds a node with available GPU resources, binds the pod</text>
  <text x="620" y="175" font-size="11" fill="#9CA3AF" text-anchor="end">kube-scheduler checks</text>
  <text x="620" y="193" font-size="11" fill="#9CA3AF" text-anchor="end">node.status.allocatable</text>

  <path d="M400 210 L400 225" stroke="#CBD5E0" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Layer 5: Device Plugin -->
  <rect x="80" y="225" width="640" height="60" rx="8" fill="#E8F5E9" stroke="#76B900" stroke-width="2" filter="url(#shadow2)"/>
  <rect x="80" y="225" width="8" height="60" rx="4" fill="url(#layerGrad2)"/>
  <text x="120" y="250" font-size="14" font-weight="bold" fill="#2E7D32">NVIDIA Device Plugin</text>
  <text x="120" y="268" font-size="11" fill="#6B7280">Discovers GPUs, reports capacity to kubelet, allocates GPU to container</text>
  <text x="620" y="250" font-size="11" fill="#9CA3AF" text-anchor="end">k8s-device-plugin DaemonSet</text>
  <text x="620" y="268" font-size="11" fill="#9CA3AF" text-anchor="end">nvidia.com/gpu resource type</text>

  <path d="M400 285 L400 300" stroke="#CBD5E0" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Layer 4: Container Runtime -->
  <rect x="80" y="300" width="640" height="60" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2" filter="url(#shadow2)"/>
  <rect x="80" y="300" width="8" height="60" rx="4" fill="url(#layerGrad3)"/>
  <text x="120" y="325" font-size="14" font-weight="bold" fill="#E65100">NVIDIA Container Toolkit</text>
  <text x="120" y="343" font-size="11" fill="#6B7280">Hooks into containerd/CRI-O, mounts GPU device files into container</text>
  <text x="620" y="325" font-size="11" fill="#9CA3AF" text-anchor="end">nvidia-container-runtime</text>
  <text x="620" y="343" font-size="11" fill="#9CA3AF" text-anchor="end">/dev/nvidia0 mounted</text>

  <path d="M400 360 L400 375" stroke="#CBD5E0" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Layer 3: Driver -->
  <rect x="80" y="375" width="640" height="55" rx="8" fill="#E8F5E9" stroke="#76B900" stroke-width="2" filter="url(#shadow2)"/>
  <rect x="80" y="375" width="8" height="55" rx="4" fill="url(#layerGrad2)"/>
  <text x="120" y="400" font-size="14" font-weight="bold" fill="#2E7D32">NVIDIA GPU Driver</text>
  <text x="120" y="416" font-size="11" fill="#6B7280">Kernel module that communicates with GPU hardware via PCIe/NVLink</text>
  <text x="620" y="400" font-size="11" fill="#9CA3AF" text-anchor="end">nvidia.ko kernel module</text>
  <text x="620" y="416" font-size="11" fill="#9CA3AF" text-anchor="end">Installed by GPU Operator</text>

  <path d="M400 430 L400 445" stroke="#CBD5E0" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Layer 2: CUDA -->
  <rect x="80" y="445" width="310" height="50" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5" filter="url(#shadow2)"/>
  <text x="235" y="470" text-anchor="middle" font-size="13" font-weight="bold" fill="#E65100">CUDA Libraries</text>
  <text x="235" y="486" text-anchor="middle" font-size="10" fill="#6B7280">cuBLAS, cuDNN, TensorRT</text>

  <rect x="410" y="445" width="310" height="50" rx="8" fill="#F3E8FF" stroke="#7C3AED" stroke-width="1.5" filter="url(#shadow2)"/>
  <text x="565" y="470" text-anchor="middle" font-size="13" font-weight="bold" fill="#7C3AED">GPU Operator</text>
  <text x="565" y="486" text-anchor="middle" font-size="10" fill="#6B7280">Automates driver + toolkit + plugin install</text>

  <path d="M400 495 L400 510" stroke="#CBD5E0" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Layer 1: Hardware -->
  <rect x="80" y="510" width="640" height="65" rx="8" fill="#1A202C" filter="url(#shadow2)"/>
  <text x="120" y="537" font-size="15" font-weight="bold" fill="#76B900">Physical GPU Hardware</text>
  <text x="120" y="557" font-size="11" fill="#A0AEC0">NVIDIA A100 (80GB) | H100 (80GB) | L4 (24GB) | T4 (16GB)</text>
  <text x="620" y="537" font-size="11" fill="#A0AEC0" text-anchor="end">PCIe Gen4/Gen5 or SXM</text>
  <text x="620" y="557" font-size="11" fill="#A0AEC0" text-anchor="end">NVLink for multi-GPU</text>

  <!-- Side annotation -->
  <rect x="15" y="130" width="55" height="290" rx="4" fill="none" stroke="#CBD5E0" stroke-width="1" stroke-dasharray="4"/>
  <text x="42" y="280" text-anchor="middle" font-size="10" fill="#A0AEC0" transform="rotate(-90, 42, 280)">NVIDIA GPU Operator manages all of this</text>
</svg>