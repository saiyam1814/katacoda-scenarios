<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 550" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="s5"><feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <linearGradient id="hostGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1A202C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2D3748;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="850" height="550" rx="12" fill="#F8F9FA"/>
  <text x="425" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1A202C">Multi-Tenant AI with vCluster</text>
  <text x="425" y="55" text-anchor="middle" font-size="13" fill="#718096">Isolated AI environments on shared Kubernetes infrastructure</text>

  <!-- Host Cluster -->
  <rect x="20" y="70" width="810" height="460" rx="12" fill="url(#hostGrad)" filter="url(#s5)"/>
  <text x="425" y="98" text-anchor="middle" font-size="16" font-weight="bold" fill="white">Host Kubernetes Cluster</text>
  <text x="425" y="115" text-anchor="middle" font-size="11" fill="#A0AEC0">Managed by platform team | GPU Operator installed | NVIDIA drivers ready</text>

  <!-- Shared Infrastructure -->
  <rect x="40" y="130" width="770" height="45" rx="6" fill="#2D3748" stroke="#4A5568" stroke-width="1"/>
  <text x="100" y="150" font-size="10" fill="#A0AEC0" font-weight="bold">Shared Platform Stack:</text>
  <rect x="240" y="140" width="90" height="24" rx="4" fill="#326CE5" opacity="0.8"/>
  <text x="285" y="156" text-anchor="middle" font-size="9" fill="white">Ingress</text>
  <rect x="340" y="140" width="90" height="24" rx="4" fill="#326CE5" opacity="0.8"/>
  <text x="385" y="156" text-anchor="middle" font-size="9" fill="white">cert-manager</text>
  <rect x="440" y="140" width="90" height="24" rx="4" fill="#76B900" opacity="0.8"/>
  <text x="485" y="156" text-anchor="middle" font-size="9" fill="white">GPU Operator</text>
  <rect x="540" y="140" width="90" height="24" rx="4" fill="#76B900" opacity="0.8"/>
  <text x="585" y="156" text-anchor="middle" font-size="9" fill="white">DCGM Monitor</text>
  <rect x="640" y="140" width="90" height="24" rx="4" fill="#7C3AED" opacity="0.8"/>
  <text x="685" y="156" text-anchor="middle" font-size="9" fill="white">vCluster Platform</text>

  <!-- vCluster 1: ML Team -->
  <rect x="40" y="190" width="370" height="230" rx="10" fill="#1A365D" stroke="#326CE5" stroke-width="2"/>
  <rect x="40" y="190" width="370" height="35" rx="10" fill="#326CE5"/>
  <rect x="40" y="215" width="370" height="10" fill="#326CE5"/>
  <text x="225" y="213" text-anchor="middle" font-size="14" font-weight="bold" fill="white">vCluster: team-ml</text>

  <!-- vCluster 1 contents -->
  <text x="60" y="245" font-size="10" fill="#93C5FD" font-weight="bold">Namespace: ai-inference</text>

  <rect x="55" y="255" width="155" height="85" rx="6" fill="#1E3A5F" stroke="#326CE5" stroke-width="1"/>
  <text x="132" y="275" text-anchor="middle" font-size="10" font-weight="bold" fill="#93C5FD">Ollama Server</text>
  <text x="132" y="290" text-anchor="middle" font-size="9" fill="#64748B">Pod: ollama-server</text>
  <text x="132" y="305" text-anchor="middle" font-size="9" fill="#64748B">Model: TinyLlama</text>
  <rect x="70" y="313" width="125" height="16" rx="3" fill="#326CE5" opacity="0.4"/>
  <text x="132" y="325" text-anchor="middle" font-size="8" fill="#93C5FD">nvidia.com/gpu: 1</text>

  <rect x="225" y="255" width="170" height="85" rx="6" fill="#1E3A5F" stroke="#326CE5" stroke-width="1"/>
  <text x="310" y="275" text-anchor="middle" font-size="10" font-weight="bold" fill="#93C5FD">RAG Application</text>
  <text x="310" y="290" text-anchor="middle" font-size="9" fill="#64748B">Pod: vector-rag</text>
  <text x="310" y="305" text-anchor="middle" font-size="9" fill="#64748B">Model: all-minilm</text>
  <rect x="240" y="313" width="140" height="16" rx="3" fill="#7C3AED" opacity="0.4"/>
  <text x="310" y="325" text-anchor="middle" font-size="8" fill="#A78BFA">Embeddings + Search</text>

  <text x="60" y="360" font-size="10" fill="#93C5FD" font-weight="bold">Resources:</text>
  <text x="60" y="377" font-size="9" fill="#64748B">GPU: 1x MIG 3g.40gb | CPU: 4 cores | Memory: 16Gi</text>
  <rect x="55" y="388" width="340" height="22" rx="4" fill="#1E3A5F" stroke="#326CE5" stroke-width="0.5"/>
  <text x="225" y="403" text-anchor="middle" font-size="9" fill="#93C5FD">Own API Server | Own etcd | Own scheduler</text>

  <!-- vCluster 2: Data Team -->
  <rect x="440" y="190" width="370" height="230" rx="10" fill="#322214" stroke="#FF6B35" stroke-width="2"/>
  <rect x="440" y="190" width="370" height="35" rx="10" fill="#FF6B35"/>
  <rect x="440" y="215" width="370" height="10" fill="#FF6B35"/>
  <text x="625" y="213" text-anchor="middle" font-size="14" font-weight="bold" fill="white">vCluster: team-data</text>

  <!-- vCluster 2 contents -->
  <text x="460" y="245" font-size="10" fill="#FDBA74" font-weight="bold">Namespace: ai-training</text>

  <rect x="455" y="255" width="155" height="85" rx="6" fill="#3D2814" stroke="#FF6B35" stroke-width="1"/>
  <text x="532" y="275" text-anchor="middle" font-size="10" font-weight="bold" fill="#FDBA74">Ollama Server</text>
  <text x="532" y="290" text-anchor="middle" font-size="9" fill="#64748B">Pod: ollama-server</text>
  <text x="532" y="305" text-anchor="middle" font-size="9" fill="#64748B">Model: CodeLlama</text>
  <rect x="470" y="313" width="125" height="16" rx="3" fill="#FF6B35" opacity="0.4"/>
  <text x="532" y="325" text-anchor="middle" font-size="8" fill="#FDBA74">nvidia.com/gpu: 2</text>

  <rect x="625" y="255" width="170" height="85" rx="6" fill="#3D2814" stroke="#FF6B35" stroke-width="1"/>
  <text x="710" y="275" text-anchor="middle" font-size="10" font-weight="bold" fill="#FDBA74">Fine-tuning Job</text>
  <text x="710" y="290" text-anchor="middle" font-size="9" fill="#64748B">Job: fine-tune-v2</text>
  <text x="710" y="305" text-anchor="middle" font-size="9" fill="#64748B">LoRA adapter</text>
  <rect x="640" y="313" width="140" height="16" rx="3" fill="#7C3AED" opacity="0.4"/>
  <text x="710" y="325" text-anchor="middle" font-size="8" fill="#A78BFA">Custom dataset</text>

  <text x="460" y="360" font-size="10" fill="#FDBA74" font-weight="bold">Resources:</text>
  <text x="460" y="377" font-size="9" fill="#64748B">GPU: 2x MIG 3g.40gb | CPU: 8 cores | Memory: 32Gi</text>
  <rect x="455" y="388" width="340" height="22" rx="4" fill="#3D2814" stroke="#FF6B35" stroke-width="0.5"/>
  <text x="625" y="403" text-anchor="middle" font-size="9" fill="#FDBA74">Own API Server | Own etcd | Own scheduler</text>

  <!-- Physical Nodes at bottom -->
  <rect x="40" y="435" width="770" height="80" rx="8" fill="#0F172A" stroke="#334155" stroke-width="1"/>
  <text x="425" y="457" text-anchor="middle" font-size="12" font-weight="bold" fill="#E2E8F0">Physical Node Pool</text>

  <rect x="60" y="465" width="170" height="38" rx="5" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <rect x="65" y="470" width="12" height="28" rx="2" fill="#76B900"/>
  <text x="150" y="482" text-anchor="middle" font-size="9" fill="#94A3B8">node-gpu-01</text>
  <text x="150" y="496" text-anchor="middle" font-size="8" fill="#64748B">A100 80GB (MIG 3x)</text>

  <rect x="250" y="465" width="170" height="38" rx="5" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <rect x="255" y="470" width="12" height="28" rx="2" fill="#76B900"/>
  <text x="340" y="482" text-anchor="middle" font-size="9" fill="#94A3B8">node-gpu-02</text>
  <text x="340" y="496" text-anchor="middle" font-size="8" fill="#64748B">A100 80GB (MIG 3x)</text>

  <rect x="440" y="465" width="170" height="38" rx="5" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <rect x="445" y="470" width="12" height="28" rx="2" fill="#326CE5"/>
  <text x="530" y="482" text-anchor="middle" font-size="9" fill="#94A3B8">node-cpu-01</text>
  <text x="530" y="496" text-anchor="middle" font-size="8" fill="#64748B">16 vCPU, 64GB RAM</text>

  <rect x="630" y="465" width="170" height="38" rx="5" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <rect x="635" y="470" width="12" height="28" rx="2" fill="#326CE5"/>
  <text x="720" y="482" text-anchor="middle" font-size="9" fill="#94A3B8">node-cpu-02</text>
  <text x="720" y="496" text-anchor="middle" font-size="8" fill="#64748B">16 vCPU, 64GB RAM</text>
</svg>