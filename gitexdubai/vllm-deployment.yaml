apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-server
  namespace: llm-workshop
  labels:
    app: vllm-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-server
  template:
    metadata:
      labels:
        app: vllm-server
    spec:
      containers:
      - name: vllm-server
        image: vllm/vllm-cpu:latest
        ports:
        - containerPort: 8000
        env:
        - name: VLLM_CPU_KVCACHE_SPACE
          value: "2"
        - name: VLLM_CPU_OMP_THREADS_BIND
          value: "auto"
        - name: VLLM_CPU_NUM_OF_RESERVED_CPU
          value: "1"
        command: ["python", "-m", "vllm.entrypoints.openai.api_server"]
        args: [
          "--model", "facebook/opt-125m",
          "--dtype", "bfloat16",
          "--host", "0.0.0.0",
          "--port", "8000",
          "--max-num-seqs", "32",
          "--max-num-batched-tokens", "2048"
        ]
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        securityContext:
          seccompProfile:
            type: Unconfined
          capabilities:
            add:
            - SYS_NICE
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-service
  namespace: llm-workshop
spec:
  selector:
    app: vllm-server
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP
